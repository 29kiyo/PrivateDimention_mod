// neoforge-1219/build.gradle
plugins {
    id 'net.neoforged.moddev' version "${mdg_version}"
}

base {
    archivesName = "PrivateDimension-neoforge-${mc_1219}"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(java_1219.toInteger())
    }
}

sourceSets {
    main {
        java      { srcDirs 'src/main/java',      '../../common/src/main/java' }
        resources { srcDirs 'src/main/resources', '../../common/src/main/resources' }
    }
}

neoForge {
    version = neoforge_1219
    runs {
        server { server() }
    }
    mods {
        privatedimension {
            sourceSet sourceSets.main
        }
    }
}

processResources {
    inputs.property 'version',          project.version
    inputs.property 'mc_version',       mc_1219
    inputs.property 'neoforge_version', neoforge_1219
    filesMatching('META-INF/neoforge.mods.toml') {
        expand(version: project.version, mc_version: mc_1219, neoforge_version: neoforge_1219)
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Implementation-Title': 'privatedimension',
                   'Implementation-Version': project.version
    }
}
