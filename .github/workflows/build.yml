name: Build PrivateDimension Mod

on:
  push:
    branches: [ main, master ]
    tags:      [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースバージョン (例: v1.0.0)'
        required: true
        type: string

# ─────────────────────────────────────────────────────────────
# Job 1: 1.21.5〜1.21.8  Java21 + Gradle 8.12.1 (Loom 1.10)
# ─────────────────────────────────────────────────────────────
jobs:
  build-1215-1218:
    name: "1.21.5–1.21.8 (Java21, Gradle8)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12.1'

      - name: Build
        env:
          BUILD_GROUP: g8
        run: |
          for proj in \
            fabric-1215 fabric-1216 fabric-1217 fabric-1218 \
            neoforge-1215 neoforge-1216 neoforge-1217 neoforge-1218; do
            echo "::group::Build :$proj"
            gradle :${proj}:build --no-daemon -Pversion=${{ github.sha }}
            echo "::endgroup::"
          done

      - name: Collect jars
        run: |
          mkdir -p dist
          for proj in \
            fabric-1215 fabric-1216 fabric-1217 fabric-1218 \
            neoforge-1215 neoforge-1216 neoforge-1217 neoforge-1218; do
            find ${proj}/build/libs -name "*.jar" \
              ! -name "*-sources*" ! -name "*-dev*" \
              -exec cp {} dist/ \; 2>/dev/null || true
          done
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: jars-1215-1218
          path: dist/*.jar
          retention-days: 1

# ─────────────────────────────────────────────────────────────
# Job 2: 1.21.9〜1.21.11  Java21 + Gradle 9.4.0 (Loom 1.14)
# ─────────────────────────────────────────────────────────────
  build-1219-12111:
    name: "1.21.9–1.21.11 (Java21, Gradle9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - name: Build
        env:
          BUILD_GROUP: g9
        run: |
          for proj in \
            fabric-1219 fabric-12110 fabric-12111 \
            neoforge-1219 neoforge-12110 neoforge-12111; do
            echo "::group::Build :$proj"
            gradle :${proj}:build --no-daemon -Pversion=${{ github.sha }}
            echo "::endgroup::"
          done

      - name: Collect jars
        run: |
          mkdir -p dist
          for proj in \
            fabric-1219 fabric-12110 fabric-12111 \
            neoforge-1219 neoforge-12110 neoforge-12111; do
            find ${proj}/build/libs -name "*.jar" \
              ! -name "*-sources*" ! -name "*-dev*" \
              -exec cp {} dist/ \; 2>/dev/null || true
          done
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: jars-1219-12111
          path: dist/*.jar
          retention-days: 1

# ─────────────────────────────────────────────────────────────
# Job 3: 26.1.x  Java25 + Gradle 9.4.0 (Loom 1.15)
# ─────────────────────────────────────────────────────────────
  build-26x:
    name: "26.1.x (Java25, Gradle9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'

      - name: Build
        env:
          BUILD_GROUP: g26
        run: |
          for proj in \
            fabric-2611 fabric-2612 \
            neoforge-2611 neoforge-2612; do
            echo "::group::Build :$proj"
            gradle :${proj}:build --no-daemon -Pversion=${{ github.sha }}
            echo "::endgroup::"
          done

      - name: Collect jars
        run: |
          mkdir -p dist
          for proj in \
            fabric-2611 fabric-2612 \
            neoforge-2611 neoforge-2612; do
            find ${proj}/build/libs -name "*.jar" \
              ! -name "*-sources*" ! -name "*-dev*" \
              -exec cp {} dist/ \; 2>/dev/null || true
          done
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: jars-26x
          path: dist/*.jar
          retention-days: 1

# ─────────────────────────────────────────────────────────────
# Release
# ─────────────────────────────────────────────────────────────
  release:
    name: "Create GitHub Release"
    needs: [ build-1215-1218, build-1219-12111, build-26x ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with: { name: jars-1215-1218, path: release/ }

      - uses: actions/download-artifact@v4
        with: { name: jars-1219-12111, path: release/ }

      - uses: actions/download-artifact@v4
        with: { name: jars-26x, path: release/ }

      - name: Rename jars
        run: |
          VER="${{ steps.ver.outputs.value }}"
          VER="${VER#v}"
          for f in release/*.jar; do
            base=$(basename "$f" .jar | sed 's/-[0-9a-f]\{40\}//')
            mv "$f" "release/${base}-${VER}.jar"
          done
          ls -lh release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.value }}
          name: "PrivateDimension ${{ steps.ver.outputs.value }}"
          body: |
            ## PrivateDimension ${{ steps.ver.outputs.value }}

            | ファイル | Minecraft | ローダー | Java |
            |---------|-----------|---------|------|
            | `PrivateDimension-fabric-1.21.5-*.jar`  | 1.21.5  | Fabric   | 21 |
            | `PrivateDimension-fabric-1.21.6-*.jar`  | 1.21.6  | Fabric   | 21 |
            | `PrivateDimension-fabric-1.21.7-*.jar`  | 1.21.7  | Fabric   | 21 |
            | `PrivateDimension-fabric-1.21.8-*.jar`  | 1.21.8  | Fabric   | 21 |
            | `PrivateDimension-fabric-1.21.9-*.jar`  | 1.21.9  | Fabric   | 21 |
            | `PrivateDimension-fabric-1.21.10-*.jar` | 1.21.10 | Fabric   | 21 |
            | `PrivateDimension-fabric-1.21.11-*.jar` | 1.21.11 | Fabric   | 21 |
            | `PrivateDimension-fabric-26.1.1-*.jar`  | 26.1.1  | Fabric   | 25 |
            | `PrivateDimension-fabric-26.1.2-*.jar`  | 26.1.2  | Fabric   | 25 |
            | `PrivateDimension-neoforge-1.21.5-*.jar`  | 1.21.5  | NeoForge | 21 |
            | `PrivateDimension-neoforge-1.21.6-*.jar`  | 1.21.6  | NeoForge | 21 |
            | `PrivateDimension-neoforge-1.21.7-*.jar`  | 1.21.7  | NeoForge | 21 |
            | `PrivateDimension-neoforge-1.21.8-*.jar`  | 1.21.8  | NeoForge | 21 |
            | `PrivateDimension-neoforge-1.21.9-*.jar`  | 1.21.9  | NeoForge | 21 |
            | `PrivateDimension-neoforge-1.21.10-*.jar` | 1.21.10 | NeoForge | 21 |
            | `PrivateDimension-neoforge-1.21.11-*.jar` | 1.21.11 | NeoForge | 21 |
            | `PrivateDimension-neoforge-26.1.1-*.jar`  | 26.1.1  | NeoForge | 25 |
            | `PrivateDimension-neoforge-26.1.2-*.jar`  | 26.1.2  | NeoForge | 25 |

            ### 前提
            - **Fabric系**: Fabric Loader + Fabric API
            - **NeoForge系**: 対応バージョンの NeoForge
            - サーバーサイドのみ（クライアント不要・入れても可）
          files: release/*.jar
          draft: false
          prerelease: false
